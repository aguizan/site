<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livros Publicados - Anderson Guizan Silva</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Livros Publicados</h1>
</header>

<div class="galeria" id="galeria"></div>

<div id="sinopse-box" class="sinopse-box">
  <div class="sinopse-conteudo">
    <h2 id="sinopse-titulo"></h2>
    <p id="sinopse-texto"></p>
    <a id="sinopse-link" class="btn" target="_blank">Comprar</a>
  </div>
</div>

<script src="livros.js"></script>

<script>
const galeria = document.getElementById("galeria");

// 1. Carrega os livros do arquivo livros.js
livros.forEach(livro => {
  const card = document.createElement("div");
  card.className = "livro";

  const img = document.createElement("img");
  img.src = "livros/" + livro.img;
  img.loading = "lazy";

  card.onclick = (e) => {
    // Evita que o clique feche a box imediatamente
    e.stopPropagation(); 
    
    document.getElementById("sinopse-titulo").textContent = livro.titulo || "";
    
    // ATIVADO: Agora a sinopse vai aparecer na tela
    document.getElementById("sinopse-texto").innerText = livro.sinopse;
    
    const link = document.getElementById("sinopse-link");
    link.href = livro.link;

    // REMOVENDO o target="_blank" para links internos (comprar.html)
    if (livro.link.includes(".html")) {
        link.removeAttribute("target");
    } else {
        link.setAttribute("target", "_blank");
    }

    document.getElementById("sinopse-box").style.display = "flex";
  };

  card.appendChild(img);
  galeria.appendChild(card);
});

// 2. Adiciona o card "Em Breve"
const cardEmBreve = document.createElement("div");
cardEmBreve.className = "placeholder"; 
cardEmBreve.innerHTML = `<span>Em breve outro livro para você.</span>`;
galeria.appendChild(cardEmBreve);

// 3. Fechar sinopse ao clicar fora do conteúdo
document.getElementById("sinopse-box").onclick = function(e) {
  if (e.target === this) {
    this.style.display = "none";
  }
};
</script>

<footer>
  <a href="index.html#menu">← Voltar</a>
</footer>

</body>
</html>
